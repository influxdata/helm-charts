{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "influxdb3-core.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-core.labels" . | nindent 4 }}
  {{- with .Values.ingress.http.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- range $path := list "/api/v3/write_lp" "/api/v2/write" "/write" "/api/v3/query" "/query" "/" }}
          - path: {{ $path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "influxdb3-core.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
{{- end }}
