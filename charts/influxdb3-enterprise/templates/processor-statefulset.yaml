{{- if .Values.processingEngine.enabled }}
{{- $processorPersistence := .Values.processingEngine.persistence | default dict }}
{{- $pluginsPVCEnabled := true }}
{{- if hasKey $processorPersistence "enabled" }}
{{- $pluginsPVCEnabled = (get $processorPersistence "enabled") }}
{{- end }}
{{- $pluginVolumeMountCtx := dict "root" . "pluginsPVCEnabled" $pluginsPVCEnabled "pluginDir" (.Values.processingEngine.pluginDir | default "/plugins") }}
{{- $hasProcessorPluginVolumeMounts := eq (include "influxdb3-enterprise.hasProcessorPluginVolumeMounts" $pluginVolumeMountCtx) "true" }}
{{- $hasProcessorPluginDirMount := eq (include "influxdb3-enterprise.hasProcessorPluginDirMount" $pluginVolumeMountCtx) "true" }}
{{- $adminTokenVolumeMounts := include "influxdb3-enterprise.adminTokenVolumeMounts" . | trim }}
{{- $hasAdminTokenVolumeMounts := ne $adminTokenVolumeMounts "" }}
{{- $permissionTokensVolumeMounts := include "influxdb3-enterprise.permissionTokensVolumeMounts" . | trim }}
{{- $hasPermissionTokensVolumeMounts := ne $permissionTokensVolumeMounts "" }}
{{- $processorExtraEnv := include "influxdb3-enterprise.componentExtraEnv" (dict "root" . "component" .Values.processingEngine) | trim }}
{{- if and (not $pluginsPVCEnabled) .Values.processingEngine.initPlugins (gt (len .Values.processingEngine.initPlugins) 0) (not $hasProcessorPluginDirMount) }}
{{- fail "processingEngine.initPlugins requires processingEngine.pluginDir to be mounted. Set processingEngine.persistence.enabled=true or configure extraVolumes/extraVolumeMounts to mount processingEngine.pluginDir." }}
{{- end }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "influxdb3-enterprise.fullname" . }}-processor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-enterprise.labels" . | nindent 4 }}
    app.kubernetes.io/component: processor
spec:
  serviceName: {{ include "influxdb3-enterprise.fullname" . }}-processor
  replicas: {{ .Values.processingEngine.replicas }}
  {{- if .Values.processingEngine.updateStrategy }}
  updateStrategy:
    {{- toYaml .Values.processingEngine.updateStrategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "influxdb3-enterprise.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret-object-storage.yaml") . | sha256sum }}
        checksum/license: {{ include "influxdb3-enterprise.licenseChecksum" . }}
        {{- with .Values.processingEngine.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "influxdb3-enterprise.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: processor
        {{- with .Values.processingEngine.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if and .Values.processingEngine.initPlugins (gt (len .Values.processingEngine.initPlugins) 0) }}
      initContainers:
        {{- range .Values.processingEngine.initPlugins }}
        - name: init-plugin-{{ .name | default "plugin" | replace "." "-" | replace "_" "-" | trunc 51 | trimSuffix "-" }}
          image: {{ include "influxdb3-enterprise.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args:
            - influxdb3
            - install
            - package
            - {{ .name | quote }}
            {{- with .source }}
            - --source
            - {{ . | quote }}
            {{- end }}
            - --plugin-dir
            - {{ $.Values.processingEngine.pluginDir | default "/plugins" | quote }}
          {{- if $processorExtraEnv }}
          env:
            {{- $processorExtraEnv | nindent 12 }}
          {{- end }}
          {{- if $hasProcessorPluginVolumeMounts }}
          volumeMounts:
            {{- include "influxdb3-enterprise.processorPluginVolumeMounts" $pluginVolumeMountCtx | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "influxdb3-enterprise.serviceAccountName" . }}
      {{- if .Values.processingEngine.priorityClassName }}
      priorityClassName: {{ .Values.processingEngine.priorityClassName }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.processingEngine.podSecurityContext | nindent 8 }}
      containers:
        - name: influxdb3
          {{- with .Values.processingEngine.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ include "influxdb3-enterprise.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- with .Values.processingEngine.numIOThreads }}
            - --num-io-threads={{ . }}
            {{- end }}
            - serve
            - --mode=process
            - --node-id=$(POD_NAME)
          envFrom:
            - configMapRef:
                name: {{ include "influxdb3-enterprise.fullname" . }}-config
          env:
            {{- include "influxdb3-enterprise.podNameEnv" . | nindent 12 }}
            {{- include "influxdb3-enterprise.licenseEnv" . | nindent 12 }}
            {{- include "influxdb3-enterprise.objectStoreSecretEnv" . | nindent 12 }}
            {{- include "influxdb3-enterprise.adminTokenEnv" . | nindent 12 }}
            {{- include "influxdb3-enterprise.permissionTokensEnv" . | nindent 12 }}
            {{- with .Values.processingEngine.pluginDir }}
            - name: INFLUXDB3_PLUGIN_DIR
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.processingEngine.pluginRepo }}
            - name: INFLUXDB3_PLUGIN_REPO
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.processingEngine.virtualEnvLocation }}
            - name: VIRTUAL_ENV
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.processingEngine.packageManager }}
            - name: INFLUXDB3_PACKAGE_MANAGER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.processingEngine.memory }}
            {{- if .execMemPoolBytes }}
            - name: INFLUXDB3_EXEC_MEM_POOL_BYTES
              value: {{ .execMemPoolBytes | quote }}
            {{- end }}
            {{- if .forceSnapshotMemThreshold }}
            - name: INFLUXDB3_FORCE_SNAPSHOT_MEM_THRESHOLD
              value: {{ .forceSnapshotMemThreshold | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.processingEngine.datafusion }}
            {{- if .numThreads }}
            - name: INFLUXDB3_NUM_DATAFUSION_THREADS
              value: {{ .numThreads | quote }}
            {{- end }}
            {{- if .maxParquetFanout }}
            - name: INFLUXDB3_DATAFUSION_MAX_PARQUET_FANOUT
              value: {{ .maxParquetFanout | quote }}
            {{- end }}
            {{- if .config }}
            - name: INFLUXDB3_DATAFUSION_CONFIG
              value: {{ .config | quote }}
            {{- end }}
            {{- end }}
            {{- include "influxdb3-enterprise.componentExtraEnv" (dict "root" . "component" .Values.processingEngine) | nindent 12 }}
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
          {{- include "influxdb3-enterprise.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.processingEngine.resources | nindent 12 }}
          {{- if or $hasProcessorPluginVolumeMounts $hasAdminTokenVolumeMounts $hasPermissionTokensVolumeMounts }}
          volumeMounts:
            {{- if $hasProcessorPluginVolumeMounts }}
            {{- include "influxdb3-enterprise.processorPluginVolumeMounts" $pluginVolumeMountCtx | nindent 12 }}
            {{- end }}
            {{- if $hasAdminTokenVolumeMounts }}
            {{- include "influxdb3-enterprise.adminTokenVolumeMounts" . | nindent 12 }}
            {{- end }}
            {{- if $hasPermissionTokensVolumeMounts }}
            {{- include "influxdb3-enterprise.permissionTokensVolumeMounts" . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- with .Values.processingEngine.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.processingEngine.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.processingEngine.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{ include "influxdb3-enterprise.sharedVolumes" . | nindent 8 }}
        {{ include "influxdb3-enterprise.adminTokenVolumes" . | nindent 8 }}
        {{ include "influxdb3-enterprise.permissionTokensVolumes" . | nindent 8 }}
  {{- if $pluginsPVCEnabled }}
  volumeClaimTemplates:
    - metadata:
        name: plugins
      spec:
        accessModes:
          - {{ .Values.processingEngine.persistence.accessMode }}
      {{- if .Values.processingEngine.persistence.storageClass }}
        storageClassName: {{ .Values.processingEngine.persistence.storageClass | quote }}
      {{- end }}
        resources:
          requests:
            storage: {{ .Values.processingEngine.persistence.size }}
  {{- end }}
{{- end }}
