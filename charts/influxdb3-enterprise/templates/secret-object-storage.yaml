{{- $type := .Values.objectStorage.type | default "s3" }}
{{- $s3Creds := or .Values.objectStorage.s3.accessKeyId .Values.objectStorage.s3.secretAccessKey .Values.objectStorage.s3.sessionToken .Values.objectStorage.s3.credentialsFile }}
{{- $azure := .Values.objectStorage.azure | default dict }}
{{- $azureExistingSecret := get $azure "existingSecret" | default "" }}
{{- $azureStorageAccount := get $azure "storageAccount" | default "" }}
{{- $azureAccessKey := get $azure "accessKey" | default "" }}
{{- $azureCreds := and $azureStorageAccount $azureAccessKey }}
{{- $googleCreds := and .Values.objectStorage.google .Values.objectStorage.google.serviceAccountJson }}

{{- if and (eq $type "s3") (not .Values.objectStorage.s3.existingSecret) $s3Creds }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "influxdb3-enterprise.objectStorageSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-enterprise.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.objectStorage.s3.accessKeyId }}
  access-key-id: {{ .Values.objectStorage.s3.accessKeyId | b64enc | quote }}
  {{- end }}
  {{- if .Values.objectStorage.s3.secretAccessKey }}
  secret-access-key: {{ .Values.objectStorage.s3.secretAccessKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.objectStorage.s3.sessionToken }}
  session-token: {{ .Values.objectStorage.s3.sessionToken | b64enc | quote }}
  {{- end }}
{{- else if and (eq $type "azure") (not $azureExistingSecret) $azureCreds }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "influxdb3-enterprise.objectStorageSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-enterprise.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $azureStorageAccount }}
  storage-account: {{ $azureStorageAccount | b64enc | quote }}
  {{- end }}
  {{- if $azureAccessKey }}
  access-key: {{ $azureAccessKey | b64enc | quote }}
  {{- end }}
{{- else if and (eq $type "google") (not .Values.objectStorage.google.existingSecret) $googleCreds }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "influxdb3-enterprise.objectStorageSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-enterprise.labels" . | nindent 4 }}
type: Opaque
data:
  service-account.json: {{ .Values.objectStorage.google.serviceAccountJson | b64enc | quote }}
{{- end }}

{{- if and (eq $type "s3") .Values.objectStorage.s3.credentialsFile }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "influxdb3-enterprise.fullname" . }}-aws-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "influxdb3-enterprise.labels" . | nindent 4 }}
type: Opaque
data:
  credentials: {{ .Values.objectStorage.s3.credentialsFile | b64enc | quote }}
{{- end }}
